<div class="main-body">
  <mat-toolbar color="primary">
    <span>Lista de calificaciones</span>
    <span class="example-spacer"></span>
    <button mat-raised-button color="basic" (click)="downloadGradeReport()">Reporte de calificaciones</button>
  </mat-toolbar>

  <mat-form-field aria-haspopup="outline">
    <mat-label>Filtrar</mat-label>
    <input matInput (keyup)="applyFilter($event)" placeholder="i.e. Marcos" #input>
  </mat-form-field>

  <div class="table-container">
    <table mat-table [dataSource]="dataSource" matSort>

      <ng-container matColumnDef="studentName">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Alumno</th>
        <td mat-cell *matCellDef="let row">{{ row.studentName }}</td>
      </ng-container>

      <ng-container matColumnDef="courseName">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Curso</th>
        <td mat-cell *matCellDef="let row">{{ row.courseName }}</td>
      </ng-container>

      <ng-container matColumnDef="cycleName">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Ciclo</th>
        <td mat-cell *matCellDef="let row">{{ row.cycleName }}</td>
      </ng-container>

      <ng-container matColumnDef="startDate">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Fecha inicio</th>
        <td mat-cell *matCellDef="let row">{{ row.startDate | date:'dd/MM/yyyy' }}</td>
      </ng-container>

      <ng-container matColumnDef="grade">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Calificación</th>
        <td mat-cell *matCellDef="let row">{{ row.active ? 'En curso' : row.grade }}</td>
      </ng-container>

      <ng-container matColumnDef="action">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Certificados</th>
        <td mat-cell *matCellDef="let row">
            <button mat-icon-button color="primary" (click)="downloadCertificate(row)" [disabled]="row.active" aria-label="Descargar certificado">
              <mat-icon>download</mat-icon>
            </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" [attr.colspan]="displayedColumns.length">No hay datos</td>
      </tr>
    </table>

    <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" pageSize="25"></mat-paginator>
  </div>
</div>
